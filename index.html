    <div class="page-title-container">
        <span class="page-title">H5 Free GameBox</span>

    <main class="content">
        <div class="game-multi-list" id="multi-games" style="margin-bottom: 20px;"></div>
        <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
        <script>
            window.googletag = window.googletag || { cmd: [] };
            var interstitialSlot = null;
            googletag.cmd.push(function () {
                googletag.defineSlot('/23334332386/game77_home_multi-size_1', [[250, 250], [336, 280], [200, 200], [300, 250]], 'div-gpt-ad-home-multi-0').addService(googletag.pubads());
                var anchorSlot = googletag.defineOutOfPageSlot('/23334332386/game77_home_anchor_1', googletag.enums.OutOfPageFormat.BOTTOM_ANCHOR);
                if (anchorSlot) anchorSlot.addService(googletag.pubads());
                interstitialSlot = googletag.defineOutOfPageSlot('/23334332386/game77_interstitial_home_to_detail_1', googletag.enums.OutOfPageFormat.INTERSTITIAL);
                if (interstitialSlot) interstitialSlot.addService(googletag.pubads());
                googletag.pubads().enableSingleRequest();
                googletag.enableServices();
                if (anchorSlot) googletag.display(anchorSlot);
                if (interstitialSlot) googletag.display(interstitialSlot);
            });

            function navigateWithInterstitial(url) {
                window.location.href = url;
            }
        </script>

        <!-- /23334332386/game77_home_multi-size_1 -->
        <div id='div-gpt-ad-home-multi-0' style='min-width: 200px; min-height: 200px;'>

                googletag.cmd.push(function () { googletag.display('div-gpt-ad-home-multi-0'); });
